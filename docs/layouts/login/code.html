<!DOCTYPE html>

<style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.8);
        }
        .primary-glow {
            box-shadow: inset 0 1px 0 0 rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- Hero/Background Decoration (Atmospheric Depth) -->
<div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] rounded-full bg-primary-fixed-dim/30 blur-[120px]"></div>
<div class="absolute top-[20%] -right-[5%] w-[30%] h-[30%] rounded-full bg-secondary-fixed/20 blur-[100px]"></div>
</div>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center p-6 z-10 relative">
<div class="w-full max-w-md">
<!-- Branding Area -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center mb-6">
<img alt="Logo Banco de Choices" class="h-16 w-auto" data-alt="professional medical education logo with a stylized brain and stethoscope icon in deep purple tones on a clean white background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDnhm_5lICnmpVuaTVKpmyTaWvB1hDeRHXsMw7pJEB0jKwRNgNOuPp_7jhC7vLSYa0avDdMRLEYtCEivVRIR6jcp1kF82bOPiloXVJIjf-WJv6LVhdWePjMzDEZCuXBBFqFl46wj-s0r9QHjWNL6JqLxTLi9y-ufBWXQ5VNpqFSV6PLCoke-uyDE-G-Nd-Sb-qtv0ZKd_vMWASMiPauu-6AyJeOjnIa5_OxtSl0_fmu3fWjGfGNb6E8V32cAisVc2bFr-hb9_dcCY0"/>
</div>
<h1 class="text-3xl font-extrabold tracking-tight text-primary">Banco de Choices</h1>
<p class="text-on-surface-variant mt-2 font-medium">Portal de Formação Médica</p>
</div>
<!-- Login Card (The Clinical Curator Aesthetic) -->
<div class="bg-surface-container-lowest border-none rounded-xl shadow-2xl shadow-primary/5 p-8 md:p-10">
<form class="space-y-6">
<!-- E-mail Field -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-on-surface ml-1" for="email">E-mail</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant text-[20px]">mail</span>
<input class="w-full pl-12 pr-4 py-3 bg-surface-container-highest rounded-lg border-none focus:ring-1 focus:ring-primary focus:bg-surface transition-all placeholder:text-outline/60 text-on-surface" id="email" placeholder="nome@exemplo.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="block text-sm font-semibold text-on-surface" for="password">Senha</label>
<a class="text-xs font-bold text-primary hover:text-on-primary-fixed-variant transition-colors" href="#">Esqueci minha senha</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant text-[20px]">lock</span>
<input class="w-full pl-12 pr-4 py-3 bg-surface-container-highest rounded-lg border-none focus:ring-1 focus:ring-primary focus:bg-surface transition-all placeholder:text-outline/60 text-on-surface" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Options -->
<div class="flex items-center space-x-2 px-1">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary bg-surface-container-highest" id="remember" type="checkbox"/>
<label class="text-sm text-on-surface-variant font-medium select-none" for="remember">Manter conectado</label>
</div>
<!-- Primary CTA -->
<button class="w-full bg-primary-container text-white font-bold py-4 rounded-lg primary-glow hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center space-x-2" type="submit">
<span>Entrar no Sistema</span>
<span class="material-symbols-outlined text-[20px]">login</span>
</button>
</form>
<!-- Alternative Action -->
<div class="mt-8 pt-8 border-t border-outline-variant/15 text-center">
<p class="text-sm text-on-surface-variant">Ainda não tem uma conta?</p>
<button class="mt-2 text-primary font-bold hover:underline">Registrar-se agora</button>
</div>
</div>
</div>
</main>
<!-- Footer Section (Mapped from JSON) -->
<footer class="bg-slate-50 dark:bg-slate-950 w-full py-12 px-8 border-t border-slate-100 dark:border-slate-900 z-10">
<div class="grid grid-cols-1 md:grid-cols-4 gap-8 max-w-7xl mx-auto">
<div class="md:col-span-1">
<span class="text-lg font-bold text-purple-900 dark:text-purple-100 block mb-2">Banco de Choices</span>
<p class="text-slate-500 dark:text-slate-400 text-sm leading-relaxed">Formação médica de precisão.</p>
</div>
<div class="md:col-span-2 flex flex-wrap gap-x-8 gap-y-4 items-center justify-center md:justify-start">
<a class="text-slate-500 dark:text-slate-400 hover:text-purple-800 dark:hover:text-purple-200 transition-colors text-sm" href="#">Privacidad</a>
<a class="text-slate-500 dark:text-slate-400 hover:text-purple-800 dark:hover:text-purple-200 transition-colors text-sm" href="#">Términos</a>
<a class="text-slate-500 dark:text-slate-400 hover:text-purple-800 dark:hover:text-purple-200 transition-colors text-sm" href="#">Contacto</a>
<a class="text-slate-500 dark:text-slate-400 hover:text-purple-800 dark:hover:text-purple-200 transition-colors text-sm" href="#">Ayuda</a>
</div>
<div class="md:col-span-1 flex items-center justify-end">
<p class="text-slate-500 dark:text-slate-400 text-xs text-right">© 2024 Banco de Choices. Formación médica de precisión.</p>
</div>
</div>
</footer>
</body></html>
